name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # ── Linux (compatible) ──────────────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # System deps mirror Dockerfile.compat (fontconfig/freetype, X11/XCB,
      # wayland, alsa/udev) needed by gpui_platform on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-xkb-dev \
            libwayland-dev libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin silvapi

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/release/silvapi dist/silvapi-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: silvapi-linux-x86_64
          path: dist/silvapi-linux-x86_64
          if-no-files-found: error

  # ── Windows ─────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      # Native MSVC build: gpui compiles DirectX shaders with fxc from the
      # Windows SDK on the runner, so the cross-build runtime-shader patch is
      # not needed here.
      - name: Build
        run: cargo build --release --bin silvapi --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/silvapi.exe dist/Silvapi.exe

      - uses: actions/upload-artifact@v4
        with:
          name: silvapi-windows-x86_64
          path: dist/Silvapi.exe
          if-no-files-found: error

  # ── macOS (universal) ───────────────────────────────────────────────────────
  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      # Real Apple hardware → Metal shaders (xcrun metal/metallib) and the media
      # crate's bindgen against the system SDK both work natively.
      - name: Build (aarch64)
        run: cargo build --release --bin silvapi --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release --bin silvapi --target x86_64-apple-darwin

      - name: Make universal binary
        run: |
          mkdir -p dist
          lipo -create -output dist/silvapi-macos-universal \
            target/aarch64-apple-darwin/release/silvapi \
            target/x86_64-apple-darwin/release/silvapi
          lipo -info dist/silvapi-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: silvapi-macos-universal
          path: dist/silvapi-macos-universal
          if-no-files-found: error

  # ── Release (tags only) ─────────────────────────────────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
