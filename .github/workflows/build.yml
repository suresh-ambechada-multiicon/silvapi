name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # ── Linux (compatible) ──────────────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # System deps mirror Dockerfile.compat (fontconfig/freetype, X11/XCB,
      # wayland, alsa/udev) needed by gpui_platform on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang pkg-config \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-xkb-dev \
            libwayland-dev libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin silvapi

      - name: Package AppImage
        run: |
          mkdir -p dist
          cp target/release/silvapi dist/silvapi-linux-x86_64

          # Build an AppDir with the binary, icon and desktop entry.
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp target/release/silvapi "$APPDIR/usr/bin/silvapi"
          chmod +x "$APPDIR/usr/bin/silvapi"
          cp icon/silvapi-256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/silvapi.png"
          cp icon/silvapi-256.png "$APPDIR/silvapi.png"          # AppImage top-level icon

          cat > "$APPDIR/silvapi.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Silvapi
          Exec=silvapi
          Icon=silvapi
          Categories=Development;Utility;
          Terminal=false
          DESKTOP
          cp "$APPDIR/silvapi.desktop" "$APPDIR/usr/share/applications/silvapi.desktop"

          cat > "$APPDIR/AppRun" <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/silvapi" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # appimagetool (run without FUSE on CI).
          curl -fL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool "$APPDIR" dist/Silvapi-x86_64.AppImage
          ls -lh dist/Silvapi-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: silvapi-linux-x86_64
          path: |
            dist/Silvapi-x86_64.AppImage
            dist/silvapi-linux-x86_64
          if-no-files-found: error

  # ── Windows ─────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      # Native MSVC build: gpui compiles DirectX shaders with fxc from the
      # Windows SDK on the runner, so the cross-build runtime-shader patch is
      # not needed here.
      - name: Build
        run: cargo build --release --bin silvapi --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/silvapi.exe dist/Silvapi.exe

      - uses: actions/upload-artifact@v4
        with:
          name: silvapi-windows-x86_64
          path: dist/Silvapi.exe
          if-no-files-found: error

  # ── macOS (universal) ───────────────────────────────────────────────────────
  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      # Real Apple hardware → Metal shaders (xcrun metal/metallib) and the media
      # crate's bindgen against the system SDK both work natively.
      - name: Build (aarch64)
        run: cargo build --release --bin silvapi --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release --bin silvapi --target x86_64-apple-darwin

      - name: Make universal binary
        run: |
          mkdir -p dist
          lipo -create -output dist/silvapi \
            target/aarch64-apple-darwin/release/silvapi \
            target/x86_64-apple-darwin/release/silvapi
          lipo -info dist/silvapi

      # Rasterize icon/silvapi.svg → AppIcon.icns at all required sizes.
      - name: Build app icon
        run: |
          brew install librsvg
          iconset=AppIcon.iconset
          mkdir -p "$iconset"
          for size in 16 32 128 256 512; do
            rsvg-convert -w $size        -h $size        icon/silvapi.svg -o "$iconset/icon_${size}x${size}.png"
            rsvg-convert -w $((size*2))  -h $((size*2))  icon/silvapi.svg -o "$iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$iconset" -o AppIcon.icns

      - name: Assemble Silvapi.app
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          APP="dist/Silvapi.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/silvapi "$APP/Contents/MacOS/silvapi"
          chmod +x "$APP/Contents/MacOS/silvapi"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          plist="$APP/Contents/Info.plist"
          plutil -create xml1 "$plist"
          pb() { /usr/libexec/PlistBuddy -c "$1" "$plist"; }
          pb "Add :CFBundleName string Silvapi"
          pb "Add :CFBundleDisplayName string Silvapi"
          pb "Add :CFBundleIdentifier string com.silvapi.app"
          pb "Add :CFBundleExecutable string silvapi"
          pb "Add :CFBundleIconFile string AppIcon"
          pb "Add :CFBundleVersion string $VERSION"
          pb "Add :CFBundleShortVersionString string $VERSION"
          pb "Add :CFBundlePackageType string APPL"
          pb "Add :CFBundleInfoDictionaryVersion string 6.0"
          pb "Add :LSMinimumSystemVersion string 10.15"
          pb "Add :NSHighResolutionCapable bool true"
          plutil -lint "$plist"
          # Ad-hoc sign so the bundle launches (unsigned/unnotarized still needs
          # the user to clear the quarantine flag — see the DMG note).
          codesign --force --deep --sign - "$APP" || true

      - name: Create DMG
        run: |
          staging=dmg-staging
          mkdir -p "$staging"
          cp -R dist/Silvapi.app "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "Silvapi" \
            -srcfolder "$staging" -ov -format UDZO \
            dist/Silvapi.dmg
          ls -lh dist/Silvapi.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: silvapi-macos
          path: |
            dist/Silvapi.dmg
            dist/silvapi
          if-no-files-found: error

  # ── Release (tags only) ─────────────────────────────────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
